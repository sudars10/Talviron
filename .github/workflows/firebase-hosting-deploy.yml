name: Deploy to Firebase Hosting on push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Firebase service account secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TALVIRON_9CC0F }}" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_TALVIRON_9CC0F secret in GitHub Actions."
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TALVIRON_9CC0F }}"
          channelId: live
          projectId: talviron-9cc0f
