name: Deploy to Firebase Hosting on push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firebase token secret
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "Missing FIREBASE_TOKEN secret. Add it in GitHub repo settings under Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:talviron-9cc0f --project talviron-9cc0f --token "${{ secrets.FIREBASE_TOKEN }}"
